services:
  - type: web
    name: ml-audit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_CELERY
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./mlaudit.db
      - key: ANTHROPIC_API_KEY
        sync: false
